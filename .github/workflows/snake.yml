name: Update Profile Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: luisfs4
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate streak stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const query = `{
              user(login: "luisfs4") {
                contributionsCollection {
                  contributionCalendar {
                    totalContributions
                    weeks { contributionDays { date contributionCount } }
                  }
                }
              }
            }`;
            const result = await github.graphql(query);
            const days = result.user.contributionsCollection.contributionCalendar.weeks.flatMap(w => w.contributionDays);
            const total = result.user.contributionsCollection.contributionCalendar.totalContributions;
            const today = new Date().toISOString().slice(0, 10);
            let cs = 0, csStart = '', csEnd = '';
            for (let i = days.length - 1; i >= 0; i--) {
              if (days[i].date > today) continue;
              if (days[i].contributionCount === 0 && days[i].date !== today) break;
              if (days[i].contributionCount > 0) { cs++; csStart = days[i].date; if (!csEnd) csEnd = days[i].date; }
            }
            let ls = 0, ts = 0, lsStart = '', lsEnd = '', tsStart = '';
            for (const day of days) {
              if (day.contributionCount > 0) { ts++; if (ts === 1) tsStart = day.date; if (ts > ls) { ls = ts; lsStart = tsStart; lsEnd = day.date; } } else { ts = 0; }
            }
            const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const fd = (d) => { const p = d.split('-'); return mn[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0]; };
            const fs2 = (d) => { const p = d.split('-'); return mn[parseInt(p[1])-1]+' '+parseInt(p[2]); };
            const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="195" viewBox="0 0 800 195"><style>@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes currstreak{0%{font-size:3px;opacity:.2}80%{font-size:34px;opacity:1}100%{font-size:28px;opacity:1}}@keyframes fire{0%{transform:translateY(0)}50%{transform:translateY(-2px)}100%{transform:translateY(0)}}.stat{animation:fadeIn .5s ease-in-out forwards}.current-num{animation:currstreak .6s ease-in-out forwards}.fire-icon{animation:fire 1s ease-in-out infinite}</style><rect width="800" height="195" rx="6" fill="#0d1117"/><line x1="267" y1="28" x2="267" y2="165" stroke="#21262d" stroke-width="1"/><line x1="533" y1="28" x2="533" y2="165" stroke="#21262d" stroke-width="1"/><g class="stat" style="animation-delay:.15s"><text x="133" y="75" text-anchor="middle" fill="#58a6ff" font-family="Segoe UI,Ubuntu,sans-serif" font-size="28" font-weight="700">'+total.toLocaleString()+'</text><text x="133" y="100" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,Ubuntu,sans-serif" font-size="14">Total Contributions</text><text x="133" y="120" text-anchor="middle" fill="#8b949e" font-family="Segoe UI,Ubuntu,sans-serif" font-size="12">Last Year</text></g><g class="stat" style="animation-delay:.3s"><circle cx="400" cy="72" r="40" fill="none" stroke="#1f6feb" stroke-width="5" opacity="0.8"/><g transform="translate(388,30)" class="fire-icon"><path d="M12 23.5C6.5 20 2 15.5 2 10.5C2 7.5 3.5 5 5.5 3.5C5.5 5.5 7 8 9 9.5C9 6 10.5 2 14 .5C13 4 15 7 17 8.5C19 10 20 12 20 14.5C20 18 16.5 23.5 12 23.5Z" fill="#ff6e40"/></g><text x="400" y="72" text-anchor="middle" fill="#58a6ff" font-family="Segoe UI,Ubuntu,sans-serif" font-size="28" font-weight="700" class="current-num">'+cs+'</text><text x="400" y="118" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,Ubuntu,sans-serif" font-size="14" font-weight="700">Current Streak</text><text x="400" y="138" text-anchor="middle" fill="#8b949e" font-family="Segoe UI,Ubuntu,sans-serif" font-size="12">'+(csStart?fs2(csStart)+' - '+fs2(csEnd):'N/A')+'</text></g><g class="stat" style="animation-delay:.45s"><text x="667" y="75" text-anchor="middle" fill="#58a6ff" font-family="Segoe UI,Ubuntu,sans-serif" font-size="28" font-weight="700">'+ls+'</text><text x="667" y="100" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,Ubuntu,sans-serif" font-size="14">Longest Streak</text><text x="667" y="120" text-anchor="middle" fill="#8b949e" font-family="Segoe UI,Ubuntu,sans-serif" font-size="12">'+fd(lsStart)+' - '+fd(lsEnd)+'</text></g></svg>';
            fs.mkdirSync('stats', {recursive: true});
            fs.writeFileSync('stats/streak.svg', svg);
            console.log('Current: '+cs+' | Longest: '+ls+' | Total: '+total);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || (git commit -m "ci: update streak stats" && git push)
